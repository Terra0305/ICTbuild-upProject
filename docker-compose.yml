services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: refind
      POSTGRES_PASSWORD: refind
      POSTGRES_DB: refind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refind -d refind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
